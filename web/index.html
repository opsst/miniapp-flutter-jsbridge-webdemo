<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Flutter Web JSBridge test console — exercise native bridge calls from a WebView.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F1117">
  <title>JSBridge Test Console</title>

  <style>
    /* Prevent white flash while Flutter bootstraps */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0F1117;
      overflow: hidden;
    }

    /* Minimal loading indicator */
    .loading-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #94A3B8;
      z-index: 999;
    }

    .loading-splash .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #2D3748;
      border-top-color: #22D3EE;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-splash .label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading-splash" id="loading">
    <div class="spinner"></div>
    <div class="label">Loading JSBridge Console…</div>
  </div>

  <script>
    // Remove splash once Flutter engine renders first frame
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
